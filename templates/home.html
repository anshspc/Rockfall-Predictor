<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rockfall Risk Predictor – EZ Tech</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f3f5f7;
      color: #333;
      margin: 0;
      padding-top: 90px; /* space for fixed navbar */
    }

    /* Navbar */
    .navbar {
      background-color: #0f2027;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      color: #fff !important;
    }
    .navbar-brand img {
      height: 48px;
      width: auto;
    }
    .team-badge {
      padding: 4px 10px;
      border: 2px solid #fff;
      border-radius: 8px;
      font-weight: 700;
      font-size: 20px;
      color: #fff;
      letter-spacing: 1px;
    }

    /* Main card */
    .form-wrapper {
      display: flex;
      justify-content: center;
      padding: 30px 15px 60px;
    }
    .form-card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      padding: 50px 40px;
      max-width: 900px;
      width: 100%;
      animation: fadeIn 0.8s ease-in-out;
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
    .form-card h1 {
      font-size: 34px;
      font-weight: 700;
      color: #203a43;
      margin-bottom: 30px;
      text-align: center;
    }
    label {
      font-weight: 500;
      margin-bottom: 6px;
    }
    .form-control, .form-select {
      border-radius: 10px;
      padding: 12px;
    }

    /* Buttons */
    .btn-primary {
      background-color: #203a43;
      border-color: #203a43;
      padding: 14px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 12px;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .btn-primary:hover {
      background-color: #16222A;
      transform: translateY(-2px);
    }

    /* Result box */
    .result-box {
      background-color: #e3f2fd;
      border: 1px solid #90caf9;
      padding: 20px;
      border-radius: 12px;
      margin-top: 25px;
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      color: #0f2027;
    }

    footer {
      text-align: center;
      padding: 25px 10px;
      background: #0f2027;
      color: #ccc;
      font-size: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<!-- Fixed Navbar with logo + team name -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#">
      <img src="{{ url_for('static', filename='SIH2.webp') }}" alt="SIH Logo">
      <span class="team-badge">EZ Tech</span>
    </a>
  </div>
</nav>

<!-- Prediction Form -->
<div class="form-wrapper">
  <div class="form-card">
    <h1>Rockfall Risk Prediction</h1>
    <form method="POST" action="/predictdata">
      <div class="row g-4">
        <div class="col-md-6">
          <label>Slope Angle (°)</label>
          <input type="number" step="0.1" name="slope_angle" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label>Rock Density (kg/m³)</label>
          <input type="number" step="0.1" name="rock_density" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label>Vibration Level</label>
          <input type="number" step="0.01" name="vibration" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label>Rainfall (mm)</label>
          <input type="number" step="0.1" name="rainfall" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label>Temperature (°C)</label>
          <input type="number" step="0.1" name="temperature" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label>Soil Moisture (%)</label>
          <input type="number" step="0.1" name="soil_moisture" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label>Joint Spacing (m)</label>
          <input type="number" step="0.1" name="joint_spacing" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label>Weathering</label>
          <select name="weathering" class="form-select" required>
            <option value="">Choose...</option>
            <option value="low">Low</option>
            <option value="moderate">Moderate</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>
      <div class="d-grid mt-5">
        <button type="submit" class="btn btn-primary btn-lg">Predict Risk</button>
      </div>
    </form>

    {% if results %}
      <div class="result-box mt-4">
        {{ results }}
      </div>
    {% endif %}
  </div>
</div>

<footer>
  &copy; {{ current_year or "2026" }} <a href="https://github.com/anshspc" style="color: #fff; text-decoration: underline;" target="_blank">Ansh (anshspc)</a> – Rockfall Risk Prediction
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
